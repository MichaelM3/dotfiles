model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"

[agents]
max_depth = 3
max_spawn_depth = 2

[agents.orchestrator]
model = "gpt-5.5"
reasoning_effort = "medium"

[agents.planner]
model = "gpt-5.5"
reasoning_effort = "medium"

[agents.developer]
model = "gpt-5.3-codex"

[agents.researcher]
model = "gpt-5.4-mini"

[features.multi_agent_v2]
max_concurrent_threads_per_session = 3

[tui.keymap.list]
move_up = ["up", "ctrl-k", "k"]
move_down = ["down", "ctrl-j", "j"]

[tui.keymap.editor]
insert_newline = "enter"
kill_line_end = "ctrl-q"
move_up = ["up", "ctrl-k"]
move_down = ["down", "ctrl-j"]

[tui.model_availability_nux]
"gpt-5.5" = 3

[mcp_servers.github]
args = ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github/github-mcp-server"]
command = "docker"
cwd = "~/"
enabled = true

[mcp_servers.docker]
args = ["mcp", "gateway", "run"]
command = "docker.exe"
cwd = "~/"
enabled = true

[projects."/home/unbalanced/dotfiles"]
trust_level = "trusted"

[projects."/home/unbalanced/.config"]
trust_level = "trusted"

[projects."/home/unbalanced/Development/OnSched/v3"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true
