model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
approvals_reviewer = "user"

[agents]
max_threads = 3
max_depth = 1

[tui.keymap.list]
move_up = ["up", "ctrl-k", "k"]
move_down = ["down", "ctrl-j", "j"]

[tui.keymap.editor]
insert_newline = "enter"
kill_line_end = "ctrl-q"
move_up = ["up", "ctrl-k"]
move_down = ["down", "ctrl-j"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[mcp_servers.github]
args = ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github/github-mcp-server"]
command = "docker"
cwd = "/home/unbalanced"
enabled = false

[mcp_servers.docker]
args = ["mcp", "gateway", "run"]
command = "docker"
cwd = "/home/unbalanced"
enabled = true

[projects."/home/unbalanced"]
trust_level = "trusted"

[projects."/home/unbalanced/.codex"]
trust_level = "trusted"

[projects."/home/unbalanced/.config"]
trust_level = "trusted"

[projects."/home/unbalanced/dotfiles"]
trust_level = "trusted"

[projects."/home/unbalanced/Work/lazyslack"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[plugins."linear@openai-curated"]
enabled = true

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."notion@openai-curated"]
enabled = true
